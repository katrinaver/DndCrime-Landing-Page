# STAGING-снипет. На сервере лежит как /etc/nginx/snippets/landing-static.conf,
# подключается в server-блоке dnd-crime-staging.gistrec.cloud (443) ДО location /api/ и location / :
#   include /etc/nginx/snippets/landing-static.conf;
# Корень домена отдаёт standalone-лендинг, ассеты — по /l/, остальное (/login, /assets, /api) — SPA приложения.
location = / {
    root /home/gistrec/DndCrimeLandingStaging/dist;
    try_files /index.html =404;
    add_header Cache-Control "no-cache" always;
}

location /l/ {
    alias /home/gistrec/DndCrimeLandingStaging/dist/;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}
