# Прод-лендинг: https://dnd-crime.gistrec.cloud/
# Триггер — пуш в main (обычно merge PR). PROD_DEPLOY_KEY ограничен на VM через
# rrsync (джейл ~/DndCrimeLanding, -wo, restrict), поэтому rsync пишет в dist/ —
# путь анкорится в корень джейла, наружу (в т.ч. в ~) выхода нет,
# --delete затрагивает только ~/DndCrimeLanding/dist.
name: prod-deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: landing-prod
  # Не прерываем rsync посреди обновления активного dist.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn build

      - name: Настроить SSH
        env:
          SSH_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Деплой-хост — стабильный алиас deploy.dnd-crime.gistrec.cloud в нашем
          # DNS: первый ключ принимается автоматически (раннер одноразовый),
          # переезд VPS за алиасом не требует правок CI.
          printf 'Host %s\n  StrictHostKeyChecking accept-new\n' '${{ vars.DEPLOY_HOST }}' > ~/.ssh/config

      - name: Залить dist на prod
        # Новые файлы сначала полностью передаются во временные пути; устаревшие
        # удаляются только после применения обновлений.
        run: rsync -az --delay-updates --delete-delay -e "ssh -i ~/.ssh/deploy_key -o ControlPath=none" dist/ gistrec@${{ vars.DEPLOY_HOST }}:dist/

      - name: Добавить ссылку на prod в смерженный PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              ...context.repo,
              commit_sha: context.sha,
            });
            const pull = pulls.find(pr => pr.merged_at && pr.base.ref === 'main');

            if (!pull) {
              core.info(`Для коммита ${context.sha} не найден смерженный PR — комментарий не нужен.`);
              return;
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: pull.number,
              body: '🚀 Лендинг залит на production: https://dnd-crime.gistrec.cloud/',
            });
