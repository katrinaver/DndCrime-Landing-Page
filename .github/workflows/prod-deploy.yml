# Прод-лендинг: https://dnd-crime.gistrec.cloud/
# Триггер — пуш в main (обычно merge PR). PROD_DEPLOY_KEY ограничен на VM через
# rrsync (джейл ~/DndCrimeLanding, -wo, restrict), поэтому rsync пишет в dist/ —
# путь анкорится в корень джейла, наружу (в т.ч. в ~) выхода нет,
# --delete затрагивает только ~/DndCrimeLanding/dist.
name: prod-deploy

on:
  push:
    branches: [main]

concurrency:
  group: landing-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn build

      - name: Настроить SSH
        env:
          SSH_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo 'germany.vps.gistrec.cloud ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJIy14M39XFKTzrbhuOaMw1Hragd2sXlrKN3VjMOwg4h' > ~/.ssh/known_hosts

      - name: Залить dist на prod
        run: rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o ControlPath=none" dist/ gistrec@germany.vps.gistrec.cloud:dist/
